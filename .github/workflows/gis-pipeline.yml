name: GIS Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gdal-bin python3-gdal python3-pip
        pip3 install pillow numpy
    
    - name: Test GDAL
      run: |
        gdalinfo --version
        echo "✅ GDAL installed"
    
    - name: Create tile directory
      run: mkdir -p app/static/tiles
    
    - name: Generate test tile
      run: |
        python3 << 'PYTHON'
        from PIL import Image
        import os
        
        os.makedirs('app/static/tiles', exist_ok=True)
        img = Image.new('RGB', (256, 256), color=(155, 211, 255))
        img.save('app/static/tiles/test-tile.png')
        print("✅ Test tile generated")
        PYTHON
    
    - name: Commit and push
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add app/static/tiles/ || true
        git commit -m "Generate tiles [skip ci]" || echo "No changes to commit"
        git push || echo "Push failed"
